apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: fitforge
    app.kubernetes.io/component: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "-1"   # after app workloads
  finalizers:
    - resources-finalizer.argocd.argoproj.io   # cascade deletes routes on app deletion
spec:
  project: fitforge
  source:
    repoURL: https://github.com/fitforge101/fitforge-charts.git
    targetRevision: develop
    path: infrastructure/envoy-gateway
    helm:
      releaseName: envoy-gateway-routes
  destination:
    server: https://kubernetes.default.svc
    namespace: fitforge-dev
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 2
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 3