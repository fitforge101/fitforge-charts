# =============================================================================
# ArgoCD Application: Envoy Gateway + HTTPRoutes
# =============================================================================
# Manual sync — changes to the gateway affect all traffic routing.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: fitforge
    app.kubernetes.io/component: infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: fitforge
  source:
    repoURL: https://github.com/fitforge101/fitforge-charts.git
    targetRevision: main
    path: infrastructure/envoy-gateway
    helm:
      releaseName: envoy-gateway-routes
  destination:
    server: https://kubernetes.default.svc
    namespace: fitforge-dev
  # ── MANUAL SYNC ─────────────────────────────────────────────────────────────
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 2
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 3
