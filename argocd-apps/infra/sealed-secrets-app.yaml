# =============================================================================
# ArgoCD Application: Sealed Secrets Controller
# =============================================================================
# IMPORTANT: Apply this FIRST before any other infra apps.
# The SealedSecret controller must be running before ArgoCD can decrypt secrets.
# This app uses MANUAL sync — infrastructure changes must be reviewed before apply.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: fitforge
    app.kubernetes.io/component: infrastructure
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: fitforge
  source:
    repoURL: https://helm.sealed-secrets.github.io/helm-charts
    chart: sealed-secrets
    targetRevision: ">=2.0.0"
    helm:
      releaseName: sealed-secrets-controller
      values: |
        fullnameOverride: sealed-secrets-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  # ── MANUAL SYNC — infrastructure is reviewed before applying ─────────────
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 2
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 3
