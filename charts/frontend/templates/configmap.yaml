apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  labels:
    app: frontend
data:
  default.conf: |
    server {
      listen 3000;
      root /usr/share/nginx/html;
      index index.html;
    
      # ── SPA fallback ──────────────────────────────────────────────────────
      # Note: All upstream proxying is handled natively by Envoy Gateway HTTPRoutes
      location / { try_files $uri /index.html; }
    }
