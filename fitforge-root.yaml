apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fitforge-root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: fitforge
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: fitforge
  source:
    repoURL: https://github.com/fitforge101/fitforge-charts.git
    targetRevision: main
    path: argocd-apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
