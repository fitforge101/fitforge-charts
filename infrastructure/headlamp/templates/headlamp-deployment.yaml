apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: headlamp
  template:
    metadata:
      labels:
        app: headlamp
    spec:
      containers:
      - name: headlamp
        image: ghcr.io/headlamp-k8s/headlamp:latest
        ports:
        - containerPort: 80
        env:
        - name: OIDC_ISSUER_URL
          value: https://keycloak.fitforge360.in/realms/fitforge
        - name: OIDC_CLIENT_ID
          value: kubernetes
