apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:24.0
        args: ["start"]

        env:
        - name: KEYCLOAK_ADMIN
          valueFrom:
            secretKeyRef:
              name: keycloak-secret
              key: KEYCLOAK_ADMIN

        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-secret
              key: KEYCLOAK_ADMIN_PASSWORD

        # ✅ DATABASE CONFIG (THIS IS THE REAL FIX)
        - name: KC_DB
          value: postgres

        - name: KC_DB_URL_HOST
          value: postgres

        - name: KC_DB_URL_DATABASE
          value: keycloak

        - name: KC_DB_USERNAME
          value: keycloak

        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-secret
              key: KC_DB_PASSWORD

        - name: KC_HOSTNAME
          value: keycloak.fitforge360.in

        - name: KC_PROXY
          value: edge

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "300m"
            memory: "512Mi"
          limits:
            cpu: "800m"
            memory: "1Gi"
