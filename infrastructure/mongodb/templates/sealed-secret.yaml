    mongodb-root-username: REPLACE_WITH_SEALED_VALUE
    mongodb-root-password: REPLACE_WITH_SEALED_VALUE
    auth-user-password: REPLACE_WITH_SEALED_VALUE
    user-user-password: REPLACE_WITH_SEALED_VALUE
    workout-user-password: REPLACE_WITH_SEALED_VALUE
    nutrition-user-password: REPLACE_WITH_SEALED_VALUE
    progress-user-password: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      creationTimestamp: null
