#     --dry-run=client \
#     --from-literal=mongodb-root-username='admin' \
#     --from-literal=mongodb-root-password='MongoRoot@123' \
#     --from-literal=auth-user-password='Authdb@123' \
#     --from-literal=user-user-password='Userdb@123' \
#     --from-literal=workout-user-password='Workoutdb@123' \
#     --from-literal=nutrition-user-password='Nutritiondb@123' \
#     --from-literal=progress-user-password='Progressdb@123' \
#     -o yaml | kubeseal --controller-namespace kube-system --format yaml \
#     > infrastructure/mongodb/templates/sealed-secret.yaml
# =============================================================================
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: mongodb-secret
  namespace: fitforge-dev
spec:
