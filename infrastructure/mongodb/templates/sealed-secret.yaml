# =============================================================================
# SealedSecret: mongodb-secret   (SAFE TO COMMIT TO GIT)
# =============================================================================
# How to generate:
#
#   1. Create the raw secret (DO NOT COMMIT THIS FILE):
#      kubectl create secret generic mongodb-secret \
#        --namespace fit-forge \
#        --from-literal=mongodb-root-password="<ROOT_PASS>" \
#        --from-literal=mongodb-passwords="<auth_user_pass>,<user_user_pass>,<workout_user_pass>,<nutrition_user_pass>,<progress_user_pass>" \
#        --from-literal=mongodb-metrics-password="<METRICS_PASS>" \
#        --from-literal=mongodb-replica-set-key="<REPLICA_KEY>" \
#        --dry-run=client -o yaml > /tmp/mongodb-secret.yaml
#
#   2. Seal it (controller must be running in cluster):
#      kubeseal --format yaml \
#        --controller-name sealed-secrets-controller \
#        --controller-namespace kube-system \
#        < /tmp/mongodb-secret.yaml \
#        > infrastructure/mongodb/templates/sealed-secret.yaml
#
#   3. Delete the plaintext immediately:
#      rm /tmp/mongodb-secret.yaml
#
#   4. Commit infrastructure/mongodb/templates/sealed-secret.yaml to git.
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mongodb-secret
  namespace: fit-forge
  labels:
    app.kubernetes.io/part-of: fitforge
    app.kubernetes.io/component: database
spec:
  encryptedData:
    # ── Replace these empty strings with the kubeseal output ─────────────────
    mongodb-root-password: ""
    mongodb-passwords: ""
    mongodb-metrics-password: ""
    mongodb-replica-set-key: ""
  template:
    metadata:
      name: mongodb-secret
      namespace: fit-forge
      labels:
        app.kubernetes.io/part-of: fitforge
        app.kubernetes.io/component: database
    type: Opaque
