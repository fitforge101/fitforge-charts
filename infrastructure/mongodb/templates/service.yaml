apiVersion: v1
kind: Service
metadata:
  name: mongodb-mongodb-headless
  namespace: fitforge-prod
  labels:
    app: mongodb-mongodb
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: fitforge
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: mongodb-mongodb
  ports:
    - name: mongodb
      port: {{ .Values.service.port }}
      targetPort: mongodb
      protocol: TCP
