apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-mongodb
  namespace: fitforge-prod
  labels:
    app: mongodb-mongodb
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: fitforge
    app.kubernetes.io/component: database
spec:
  serviceName: mongodb-mongodb-headless
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-mongodb
  template:
    metadata:
      labels:
        app: mongodb-mongodb
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/part-of: fitforge
        app.kubernetes.io/component: database
    spec:
      securityContext:
        fsGroup: 999

      containers:
        - name: mongodb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP

          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.rootUsernameKey }}
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret }}
                  key: {{ .Values.auth.rootPasswordKey }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
                - --username
                - $(MONGO_INITDB_ROOT_USERNAME)
                - --password
                - $(MONGO_INITDB_ROOT_PASSWORD)
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
                - --username
                - $(MONGO_INITDB_ROOT_USERNAME)
                - --password
                - $(MONGO_INITDB_ROOT_PASSWORD)
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: data
              mountPath: /data/db

  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: mongodb-mongodb
          app.kubernetes.io/part-of: fitforge
      spec:
        accessModes: {{ toYaml .Values.persistence.accessModes | nindent 10 }}
        storageClassName: {{ .Values.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- else }}
  # persistence disabled — emptyDir (dev/test only)
  volumes:
    - name: data
      emptyDir: {}
  {{- end }}
