# =============================================================================
# NetworkPolicy: Redis
# =============================================================================
# Default: deny all ingress.
# Allow: only FitForge microservices that legitimately use Redis.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  namespace: fit-forge
  labels:
    app: redisdb-redis
    app.kubernetes.io/part-of: fitforge
spec:
  podSelector:
    matchLabels:
      app: redisdb-redis
  policyTypes:
    - Ingress
  ingress:
    # Allow from all FitForge backend microservices
    - from:
        - podSelector:
            matchLabels:
              app: auth-service
        - podSelector:
            matchLabels:
              app: user-service
        - podSelector:
            matchLabels:
              app: workout-service
        - podSelector:
            matchLabels:
              app: nutrition-service
        - podSelector:
            matchLabels:
              app: progress-service
        - podSelector:
            matchLabels:
              app: ai-agent-service
      ports:
        - port: 6379
          protocol: TCP
