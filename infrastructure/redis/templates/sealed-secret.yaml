# =============================================================================
# SealedSecret: redis-secret   (SAFE TO COMMIT TO GIT)
# =============================================================================
# Redis is currently running without a password. If you want to add auth:
#
#   1. kubectl create secret generic redis-secret \
#        --namespace fit-forge \
#        --from-literal=redis-password="<YOUR_REDIS_PASSWORD>" \
#        --dry-run=client -o yaml > /tmp/redis-secret.yaml
#
#   2. kubeseal --format yaml \
#        --controller-name sealed-secrets-controller \
#        --controller-namespace kube-system \
#        < /tmp/redis-secret.yaml \
#        > infrastructure/redis/templates/sealed-secret.yaml
#
#   3. rm /tmp/redis-secret.yaml
#
# Then add requirepass to your Redis StatefulSet command args and reference
# the secret via env var REDIS_PASSWORD.
#
# ── STUB (no-auth mode — no sealed data needed) ──────────────────────────────
# This file is a placeholder. Uncomment and fill if you enable Redis auth.
