apiVersion: v1
kind: Service
metadata:
  name: redisdb-redis
  namespace: fit-forge
  labels:
    app: redisdb-redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: fitforge
spec:
  type: {{ .Values.service.type }}
  selector:
    app: redisdb-redis
  ports:
    - name: redis
      port: {{ .Values.service.port }}
      targetPort: redis
      protocol: TCP
