apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redisdb-redis
  namespace: fit-forge
  labels:
    app: redisdb-redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: fitforge
    app.kubernetes.io/component: cache
spec:
  serviceName: redisdb-redis
  replicas: {{ if not .Values.autoscaling.enabled }}{{ .Values.replicaCount | default 1 }}{{ end }}
  selector:
    matchLabels:
      app: redisdb-redis
  template:
    metadata:
      labels:
        app: redisdb-redis
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: fitforge
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
