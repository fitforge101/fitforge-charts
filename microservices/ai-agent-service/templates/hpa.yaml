{{- if (index .Values.services .Chart.Name).autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-agent-service
  namespace: fitforge-prod
  labels:
    app: ai-agent-service
    app.kubernetes.io/part-of: fitforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-agent-service
  minReplicas: {{ (index .Values.services .Chart.Name).autoscaling.minReplicas }}
  maxReplicas: {{ (index .Values.services .Chart.Name).autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ (index .Values.services .Chart.Name).autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ (index .Values.services .Chart.Name).autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
