# =============================================================================
# SealedSecret: ai-agent-service-secret   (SAFE TO COMMIT TO GIT)
# =============================================================================
# Secrets needed: MONGO_URI, JWT_SECRET, GOOGLE_API_KEY, LLM_MODEL
#
# HOW TO GENERATE:
#   1. kubectl create secret generic ai-agent-service-secret \
#        --namespace fit-forge \
#        --from-literal=MONGO_URI="<MONGO_CONNECTION_STRING>" \
#        --from-literal=JWT_SECRET="<YOUR_STRONG_JWT_SECRET>" \
#        --from-literal=GOOGLE_API_KEY="<YOUR_GOOGLE_GEMINI_API_KEY>" \
#        --from-literal=LLM_MODEL="gemini-2.5-flash-lite" \
#        --dry-run=client -o yaml > /tmp/ai-agent-service-secret.yaml
#   2. kubeseal --format yaml --controller-name sealed-secrets-controller \
#        --controller-namespace kube-system \
#        < /tmp/ai-agent-service-secret.yaml \
#        > microservices/ai-agent-service/templates/sealed-secret.yaml
#   3. rm /tmp/ai-agent-service-secret.yaml
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ai-agent-service-secret
  namespace: fit-forge
  labels:
    app: ai-agent-service
    app.kubernetes.io/part-of: fitforge
spec:
  encryptedData:
    MONGO_URI: ""
    JWT_SECRET: ""
    GOOGLE_API_KEY: ""
    LLM_MODEL: ""
  template:
    metadata:
      name: ai-agent-service-secret
      namespace: fit-forge
      labels:
        app: ai-agent-service
    type: Opaque
