apiVersion: v1
kind: Service
metadata:
  name: ai-agent-service
  namespace: fit-forge
  labels:
    app: ai-agent-service
    app.kubernetes.io/name: ai-agent-service
    app.kubernetes.io/part-of: fitforge
spec:
  type: {{ .Values.service.type }}
  selector:
    app: ai-agent-service
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
