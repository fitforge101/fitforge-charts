# =============================================================================
# SealedSecret: auth-service-secret   (SAFE TO COMMIT TO GIT)
# =============================================================================
# Secrets needed: MONGO_URI, JWT_SECRET
#
# HOW TO GENERATE:
#   1. Create raw secret (DO NOT COMMIT):
#      kubectl create secret generic auth-service-secret \
#        --namespace fit-forge \
#        --from-literal=MONGO_URI="mongodb://auth_user:<PASSWORD>@mongodb-0.mongodb-headless.fit-forge.svc.cluster.local:27017,mongodb-1.mongodb-headless.fit-forge.svc.cluster.local:27017,mongodb-2.mongodb-headless.fit-forge.svc.cluster.local:27017/auth_db?replicaSet=rs0" \
#        --from-literal=JWT_SECRET="<YOUR_STRONG_JWT_SECRET>" \
#        --dry-run=client -o yaml > /tmp/auth-service-secret.yaml
#
#   2. Seal it:
#      kubeseal --format yaml \
#        --controller-name sealed-secrets-controller \
#        --controller-namespace kube-system \
#        < /tmp/auth-service-secret.yaml \
#        > microservices/auth-service/templates/sealed-secret.yaml
#
#   3. Delete the plaintext: rm /tmp/auth-service-secret.yaml
#   4. Commit this file to git.
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: auth-service-secret
  namespace: fit-forge
  labels:
    app: auth-service
    app.kubernetes.io/part-of: fitforge
spec:
  encryptedData:
    # ── Replace with kubeseal output ─────────────────────────────────────────
    MONGO_URI: ""
    JWT_SECRET: ""
  template:
    metadata:
      name: auth-service-secret
      namespace: fit-forge
      labels:
        app: auth-service
    type: Opaque
