apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: fit-forge
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: fitforge
data:
  default.conf: |
    server {
      listen 3000;
      root /usr/share/nginx/html;
      index index.html;

      # ── SPA fallback ────────────────────────────────────────────────────────
      # All API proxying is handled natively by Envoy Gateway HTTPRoutes.
      location / { try_files $uri /index.html; }
    }
