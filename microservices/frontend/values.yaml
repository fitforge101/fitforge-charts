# frontend values
replicaCount: 1
image:
  repository: fitforge360/frontend
  pullPolicy: Always
  # ── Update this tag in CI after a successful build & push ─────────────────
  tag: "dev-930118f332072c7246e8031d2c9598bd944d35f7"
resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
