# frontend values
replicaCount: 1

image:
  repository: fitforge360/frontend
  pullPolicy: Always
  # ── Update this tag in CI after a successful build & push ─────────────────
  tag: "frontend-v0.1.0"

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

networkPolicy:
  enabled: true
