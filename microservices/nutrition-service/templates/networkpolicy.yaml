{{- if .Values.networkPolicy.enabled }}
# =============================================================================
# NetworkPolicy: nutrition-service
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nutrition-service-network-policy
  namespace: fitforge-dev
  labels:
    app: nutrition-service
    app.kubernetes.io/part-of: fitforge
spec:
  podSelector:
    matchLabels:
      app: nutrition-service
  policyTypes:
    - Ingress
  ingress:
    # Allow from Envoy Gateway pods
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: envoy
      ports:
        - port: 5004
          protocol: TCP
{{- end }}
