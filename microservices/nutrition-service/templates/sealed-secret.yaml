# =============================================================================
# SealedSecret: nutrition-service-secret   (SAFE TO COMMIT TO GIT)
# =============================================================================
# Secrets needed: MONGO_URI, JWT_SECRET
#
# HOW TO GENERATE:
#   1. kubectl create secret generic nutrition-service-secret \
#        --namespace fit-forge \
#        --from-literal=MONGO_URI="mongodb://nutrition_user:<PASSWORD>@mongodb-0.mongodb-headless.fit-forge.svc.cluster.local:27017,mongodb-1.mongodb-headless.fit-forge.svc.cluster.local:27017,mongodb-2.mongodb-headless.fit-forge.svc.cluster.local:27017/nutrition_db?replicaSet=rs0" \
#        --from-literal=JWT_SECRET="<YOUR_STRONG_JWT_SECRET>" \
#        --dry-run=client -o yaml > /tmp/nutrition-service-secret.yaml
#   2. kubeseal --format yaml --controller-name sealed-secrets-controller \
#        --controller-namespace kube-system \
#        < /tmp/nutrition-service-secret.yaml \
#        > microservices/nutrition-service/templates/sealed-secret.yaml
#   3. rm /tmp/nutrition-service-secret.yaml
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: nutrition-service-secret
  namespace: fit-forge
  labels:
    app: nutrition-service
    app.kubernetes.io/part-of: fitforge
spec:
  encryptedData:
    MONGO_URI: ""
    JWT_SECRET: ""
  template:
    metadata:
      name: nutrition-service-secret
      namespace: fit-forge
      labels:
        app: nutrition-service
    type: Opaque
