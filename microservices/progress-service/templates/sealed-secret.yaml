# =============================================================================
# SealedSecret: progress-service-secret   (SAFE TO COMMIT TO GIT)
# =============================================================================
# Secrets needed: MONGO_URI, JWT_SECRET
#
# HOW TO GENERATE:
#   1. kubectl create secret generic progress-service-secret \
#        --namespace fitforge-dev \
#        --from-literal=MONGO_URI="mongodb://progress_user:<PASSWORD>@mongodb-0.mongodb-headless.fitforge-dev.svc.cluster.local:27017,mongodb-1.mongodb-headless.fitforge-dev.svc.cluster.local:27017,mongodb-2.mongodb-headless.fitforge-dev.svc.cluster.local:27017/progress_db?replicaSet=rs0" \
#        --from-literal=JWT_SECRET="<YOUR_STRONG_JWT_SECRET>" \
#        --dry-run=client -o yaml > /tmp/progress-service-secret.yaml
#   2. kubeseal --format yaml --controller-name sealed-secrets-controller \
#        --controller-namespace kube-system \
#        < /tmp/progress-service-secret.yaml \
#        > microservices/progress-service/templates/sealed-secret.yaml
#   3. rm /tmp/progress-service-secret.yaml
# =============================================================================

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: progress-service-secret
  namespace: fitforge-dev
spec:
  encryptedData:
    JWT_SECRET: 
    MONGO_URI: 
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: progress-service
      name: progress-service-secret
      namespace: fitforge-dev
    type: Opaque