# progress-service values
replicaCount: 1

image:
  repository: fitforge360/progress-service
  pullPolicy: Always
  # ── Update this tag in CI after a successful build & push ─────────────────
  tag: "progress-service-v0.0.2"

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

service:
  type: ClusterIP
  port: 5005
  targetPort: 5005

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

networkPolicy:
  enabled: true
