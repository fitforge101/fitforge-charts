global: {}

services:
  ai-agent-service:
    replicaCount: 1
    image:
      repository: fitforge360/ai-service
      pullPolicy: Always
      tag: "ai-service-v0.0.2"
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    service:
      type: ClusterIP
      port: 5006
      targetPort: 5006
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 75
    networkPolicy:
      enabled: true

