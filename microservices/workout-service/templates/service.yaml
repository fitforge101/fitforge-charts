apiVersion: v1
kind: Service
metadata:
  name: workout-service
  namespace: fitforge-prod
  labels:
    app: workout-service
    app.kubernetes.io/name: workout-service
    app.kubernetes.io/part-of: fitforge
spec:
  type: {{ .Values.service.type }}
  selector:
    app: workout-service
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
